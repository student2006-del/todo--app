<!doctype html>
<html lang="uk">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TodoApp - Завдання</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background: #eef3fa;
      color: #2f2f4f;
    }


    .skip-link{
      position: absolute;
      left: -999px;
      top: 10px;

      background: #d26ac2;
      color: white;

      padding: 10px 15px;

      border-radius: 8px;

      text-decoration: none;
    }

    .skip-link:focus{
      left: 10px;
    }


    header{
      text-align: center;
      padding: 30px;
    }

    h1{
      font-size: 56px;
      margin-bottom: 10px;
    }

    .subtitle{
      color: #7c86a2;
      margin-bottom: 25px;
    }


    nav ul{
      display: flex;
      justify-content: center;
      gap: 25px;

      list-style: none;
    }

    nav a{
      text-decoration: none;
      color: #2f2f4f;
      font-weight: bold;
      padding-bottom: 5px;
    }

    nav a:hover,
    nav a:focus{
      color: #d26ac2;
      border-bottom: 2px solid #d26ac2;
      outline: none;
    }

    main{
      width: 520px;

      margin: 40px auto;

      background: #dde6f1;

      padding: 35px;

      border-radius: 16px;
    }

    section h2{
      margin-bottom: 20px;
      font-size: 32px;
    }



    .todo-input{
      display: flex;
      gap: 10px;

      margin-bottom: 25px;
    }

    .todo-input input{
      flex: 1;

      padding: 12px;

      border: none;

      border-radius: 10px;

      font-size: 16px;
    }

    .todo-input input:focus{
      outline: 2px solid #d26ac2;
    }

    .todo-input button{
      width: 55px;

      border: none;

      border-radius: 10px;

      background: #d26ac2;

      color: white;

      font-size: 24px;

      cursor: pointer;
    }

    .todo-input button:hover,
    .todo-input button:focus{
      background: #bb58ac;
      outline: 2px solid #2f2f4f;
    }


    .task{
      background: #edf2f8;

      border-radius: 10px;

      padding: 15px;

      margin-bottom: 12px;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-left{
      display: flex;
      align-items: center;
      gap: 12px;
    }


    .check{
      width: 22px;
      height: 22px;

      border-radius: 5px;

      background: #d26ac2;

      color: white;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;
    }



    .delete{
      cursor: pointer;
      font-size: 20px;
    }



    .filters{
      display: flex;
      justify-content: center;
      gap: 20px;

      margin-top: 25px;
    }

    .filters button{
      border: none;
      background: transparent;

      cursor: pointer;

      font-size: 16px;

      color: #7c86a2;

      padding-bottom: 5px;
    }

    .filters button:hover,
    .filters button:focus{
      color: #d26ac2;
      outline: none;
    }

    .filters .active{
      color: #d26ac2;
      border-bottom: 2px solid #d26ac2;
    }



    figure{
      margin-top: 35px;
      text-align: center;
    }

    figure img{
      width: 100%;
      border-radius: 12px;
    }

    figcaption{
      margin-top: 10px;
      color: #6d7690;
    }



    footer{
      text-align: center;
      padding: 25px;

      color: #6d7690;
    }

  </style>

</head>

<body>


<a
  class="skip-link"
  href="#main"
>
  Перейти до основного змісту
</a>



<header>

  <h1>TodoApp</h1>

  <p class="subtitle">
    Organize your day simply
  </p>



  <nav aria-label="Головна навігація">

    <ul>

      <li>
        <a href="index.html">
          Головна
        </a>
      </li>

      <li>
        <a
          href="topic.html"
          aria-current="page"
        >
          Завдання
        </a>
      </li>

      <li>
        <a href="contacts.html">
          Контакти
        </a>
      </li>

    </ul>

  </nav>
    <p>
      Головна → Завдання
    </p>


</header>



<main id="main">

  <section>

    <h2>Мої завдання</h2>



    <div class="todo-input">

      <input
        type="text"
        id="task-input"
        placeholder="Add new task..."
        aria-label="Нове завдання"
      >

      <button
        type="button"
        id="add-btn"
      >
        +
      </button>

    </div>



    <div id="task-list"></div>



    <div class="filters">

      <button
        class="filter-btn active"
        data-filter="all"
      >
        All
      </button>

      <button
        class="filter-btn"
        data-filter="active"
      >
        Active
      </button>

      <button
        class="filter-btn"
        data-filter="completed"
      >
        Completed
      </button>

    </div>

  </section>


  <figure>

    <img
      src="https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b"
      alt="Організація щоденних справ у TodoApp"
    >

    <figcaption>
      TodoApp допомагає організовувати щоденні завдання.
    </figcaption>

  </figure>

</main>


<footer>

  <p>
    © 2026 TodoApp. Усі права захищені.
  </p>

  <nav aria-label="Навігація в підвалі">

    <ul>

      <li>
        <a href="index.html">
          Головна
        </a>
      </li>

      <li>
        <a href="contacts.html">
          Контакти
        </a>
      </li>

    </ul>

  </nav>

</footer>



<script src="topic.js"></script>

</body>
</html>
